<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speculative decoding pipeline</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #121015;
      --slab: #1e1c24;
      --ink: #c8c4bc;
      --draft: #e8a838;
      --target: #5ec8d4;
      --accept: #7cb87c;
      --reject: #c75c5c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--void);
      color: var(--ink); font-family: "IBM Plex Mono", monospace;
      display: grid; place-items: center; padding: 2rem;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .slide {
      width: min(1100px, 100%);
      border: 2px solid rgba(255,255,255,0.12);
      background: var(--slab);
      padding: 2.25rem 2.5rem 2rem;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    }
    h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin: 0 0 0.25rem; color: #fff; }
    .sub { font-size: 0.75rem; opacity: 0.55; margin-bottom: 2rem; }
    svg { width: 100%; height: auto; display: block; }
    .token { animation: pulse 2.4s ease-in-out infinite; }
    .token:nth-child(2) { animation-delay: 0.3s; }
    .token:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    .flow { animation: dash 3s linear infinite; }
    @keyframes dash {
      to { stroke-dashoffset: -24; }
    }
    footer { margin-top: 1.25rem; font-size: 0.68rem; opacity: 0.45; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="slide">
    <h1>Speculative decoding — dataflow</h1>
    <p class="sub">Draft model proposes γ tokens in parallel · Target verifies in one (batched) forward · Accept prefix · resample tail</p>
    <svg viewBox="0 0 920 340" xmlns="http://www.w3.org/2000/svg" aria-label="Pipeline diagram">
      <defs>
        <linearGradient id="gDraft" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#f0b84a"/>
          <stop offset="100%" style="stop-color:#c47820"/>
        </linearGradient>
        <linearGradient id="gTgt" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#4fd4e8"/>
          <stop offset="100%" style="stop-color:#2a8a9a"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- Draft box -->
      <rect x="40" y="40" width="200" height="120" rx="6" fill="#2a2618" stroke="url(#gDraft)" stroke-width="2"/>
      <text x="140" y="78" text-anchor="middle" fill="#f5d08a" font-size="14" font-weight="600">DRAFT MODEL</text>
      <text x="140" y="100" text-anchor="middle" fill="rgba(255,220,160,0.55)" font-size="11">small · fast · same vocab</text>
      <g class="token">
        <rect x="60" y="118" width="28" height="32" rx="4" fill="url(#gDraft)" opacity="0.9"/>
        <rect x="96" y="118" width="28" height="32" rx="4" fill="url(#gDraft)" opacity="0.7"/>
        <rect x="132" y="118" width="28" height="32" rx="4" fill="url(#gDraft)" opacity="0.5"/>
        <rect x="168" y="118" width="28" height="32" rx="4" fill="url(#gDraft)" opacity="0.35"/>
      </g>
      <!-- Arrows to target -->
      <path d="M 250 100 L 320 100" fill="none" stroke="#e8a838" stroke-width="2" stroke-dasharray="6 6" class="flow"/>
      <polygon points="318,94 332,100 318,106" fill="#e8a838"/>
      <text x="285" y="88" text-anchor="middle" fill="#e8a838" font-size="10">γ proposals</text>
      <!-- Target -->
      <rect x="340" y="40" width="280" height="120" rx="6" fill="#152428" stroke="url(#gTgt)" stroke-width="2"/>
      <text x="480" y="78" text-anchor="middle" fill="#8ee8f2" font-size="14" font-weight="600">TARGET MODEL</text>
      <text x="480" y="100" text-anchor="middle" fill="rgba(140,220,230,0.5)" font-size="11">single forward · logits for all positions</text>
      <rect x="365" y="115" width="230" height="38" rx="4" fill="rgba(45,140,150,0.25)" stroke="#5ec8d4" stroke-width="1"/>
      <text x="480" y="138" text-anchor="middle" fill="#a8eef5" font-size="11">p₁…pγ vs draft · find match length</text>
      <!-- Accept / reject -->
      <path d="M 640 100 L 710 70" fill="none" stroke="#7cb87c" stroke-width="2"/>
      <path d="M 640 100 L 710 130" fill="none" stroke="#c75c5c" stroke-width="2"/>
      <polygon points="706,64 718,70 706,76" fill="#7cb87c"/>
      <polygon points="706,124 718,130 706,136" fill="#c75c5c"/>
      <rect x="720" y="48" width="160" height="52" rx="6" fill="#1a2218" stroke="#7cb87c" stroke-width="1.5"/>
      <text x="800" y="82" text-anchor="middle" fill="#9dca9d" font-size="12" font-weight="600">ACCEPT k tokens</text>
      <rect x="720" y="118" width="160" height="52" rx="6" fill="#221818" stroke="#c75c5c" stroke-width="1.5"/>
      <text x="800" y="152" text-anchor="middle" fill="#d99999" font-size="12" font-weight="600">REJECT · resample</text>
      <!-- Loop back hint -->
      <path d="M 800 200 Q 480 260 140 200" fill="none" stroke="rgba(200,200,200,0.2)" stroke-width="1.5" stroke-dasharray="4 4"/>
      <text x="480" y="248" text-anchor="middle" fill="rgba(200,200,200,0.35)" font-size="10">next step: extend context with accepted prefix</text>
      <!-- Throughput bar -->
      <text x="40" y="295" fill="rgba(200,200,200,0.5)" font-size="11">Effective tokens / wall-clock ↑ when acceptance rate ↑ and draft is cheap</text>
      <rect x="40" y="305" width="840" height="8" rx="2" fill="#2a2830"/>
      <rect x="40" y="305" width="520" height="8" rx="2" fill="url(#gTgt)" filter="url(#glow)" opacity="0.85">
        <animate attributeName="width" values="400;560;480;520" dur="4s" repeatCount="indefinite"/>
      </rect>
    </svg>
    <footer>Leviathan &amp; matching works: draft proposals must be consistent with target distribution (rejection sampling / parallel verification).</footer>
  </div>
</body>
</html>
