<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spectre — activity (decode &amp; run)</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #fdfcfa;
      --ink: #292524;
      --edge: #d6d3d1;
      --act: #1d4ed8;
      --cond: #b45309;
      --end: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, system-ui, sans-serif;
      padding: 2rem clamp(1rem, 3vw, 2.5rem);
    }
    .slide { max-width: 700px; margin: 0 auto; }
    h1 {
      font-family: Newsreader, Georgia, serif;
      font-weight: 600;
      font-size: 1.75rem;
      margin: 0 0 0.4rem;
    }
    .sub { font-size: 0.88rem; color: #78716c; margin-bottom: 1.5rem; line-height: 1.5; }
    .uml { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: #a8a29e; margin-bottom: 0.5rem; }
    svg { width: 100%; height: auto; }
    .panel { border: 1px solid var(--edge); border-radius: 8px; padding: 1.25rem; background: #fff; }
    footer { margin-top: 1.25rem; font-size: 0.75rem; color: #a8a29e; }
  </style>
</head>
<body>
  <div class="slide">
    <h1>Activity diagram — <code>decode()</code> &amp; <code>run()</code></h1>
    <p class="sub">Swimlane view of the decoder-only generation path in Spectre. Encoder models take the upper branch first.</p>
    <p class="uml">UML activity</p>
    <div class="panel">
      <svg viewBox="0 0 520 720" xmlns="http://www.w3.org/2000/svg">
        <text x="260" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1c1917">decode()</text>
        <rect x="140" y="32" width="240" height="36" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
        <text x="260" y="54" text-anchor="middle" font-size="10" fill="#1e3a8a">Build sampler chain (top_k, top_p, temp, dist)</text>
        <line x1="260" y1="68" x2="260" y2="88" stroke="#57534e" stroke-width="1.5"/>
        <rect x="140" y="88" width="240" height="32" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
        <text x="260" y="108" text-anchor="middle" font-size="10" fill="#1e3a8a">cur_batch ← full prompt</text>
        <line x1="260" y1="120" x2="260" y2="138" stroke="#57534e" stroke-width="1.5"/>
        <polygon points="260,138 220,168 300,168" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
        <text x="260" y="160" text-anchor="middle" font-size="9" fill="#9a3412">encoder model?</text>
        <line x1="220" y1="168" x2="100" y2="168" stroke="#57534e" stroke-width="1.5"/>
        <line x1="100" y1="168" x2="100" y2="200" stroke="#57534e" stroke-width="1.5"/>
        <text x="115" y="162" font-size="8" fill="#78716c">yes</text>
        <polygon points="100,200 70,220 130,220" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
        <text x="100" y="214" text-anchor="middle" font-size="8" fill="#9a3412">spec + draft?</text>
        <line x1="130" y1="220" x2="180" y2="220" stroke="#57534e"/>
        <line x1="180" y1="220" x2="180" y2="248" stroke="#57534e" stroke-width="1.5"/>
        <text x="145" y="216" font-size="7" fill="#78716c">yes</text>
        <rect x="120" y="248" width="120" height="36" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
        <text x="180" y="270" text-anchor="middle" font-size="9" fill="#92400e">draft() — KV reuse</text>
        <line x1="180" y1="284" x2="180" y2="308" stroke="#57534e" stroke-width="1.5"/>
        <line x1="70" y1="220" x2="40" y2="220" stroke="#57534e"/>
        <line x1="40" y1="220" x2="40" y2="308" stroke="#57534e" stroke-width="1.5"/>
        <text x="52" y="216" font-size="7" fill="#78716c">no</text>
        <line x1="300" y1="168" x2="380" y2="168" stroke="#57534e"/>
        <line x1="380" y1="168" x2="380" y2="308" stroke="#57534e" stroke-width="1.5"/>
        <text x="330" y="162" font-size="8" fill="#78716c">no</text>
        <rect x="300" y="308" width="160" height="36" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
        <text x="380" y="330" text-anchor="middle" font-size="10" fill="#1e3a8a">llama_encode (if encoder)</text>
        <line x1="260" y1="168" x2="260" y2="308" stroke="#57534e" stroke-dasharray="4 3" opacity="0.5"/>
        <line x1="100" y1="308" x2="260" y2="308" stroke="#57534e" stroke-width="1.5"/>
        <line x1="260" y1="308" x2="260" y2="356" stroke="#57534e" stroke-width="1.5"/>
        <rect x="140" y="356" width="240" height="40" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
        <text x="260" y="374" text-anchor="middle" font-size="10" fill="#1e3a8a">Set batch to decoder</text>
        <text x="260" y="388" text-anchor="middle" font-size="9" fill="#1e3a8a">start token (or BOS)</text>
        <line x1="260" y1="396" x2="260" y2="430" stroke="#57534e" stroke-width="2"/>
        <!-- run merge -->
        <text x="260" y="448" text-anchor="middle" font-size="12" font-weight="600">run()</text>
        <rect x="130" y="458" width="260" height="32" rx="6" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
        <text x="260" y="478" text-anchor="middle" font-size="10" fill="#14532d">Open metrics.csv header</text>
        <line x1="260" y1="490" x2="260" y2="508" stroke="#57534e" stroke-width="1.5"/>
        <polygon points="260,508 215,538 305,538" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
        <text x="260" y="530" text-anchor="middle" font-size="9" fill="#1e40af">more tokens?</text>
        <line x1="305" y1="523" x2="400" y2="523" stroke="#57534e"/>
        <line x1="400" y1="523" x2="400" y2="560" stroke="#57534e"/>
        <text x="330" y="518" font-size="8" fill="#78716c">no → exit</text>
        <circle cx="400" cy="572" r="14" fill="#15803d" stroke="#14532d" stroke-width="2"/>
        <line x1="215" y1="523" x2="130" y2="523" stroke="#57534e"/>
        <line x1="130" y1="523" x2="130" y2="568" stroke="#57534e" stroke-width="1.5"/>
        <text x="165" y="518" font-size="8" fill="#78716c">yes</text>
        <rect x="50" y="568" width="160" height="70" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
        <text x="130" y="590" text-anchor="middle" font-size="9" fill="#1e3a8a">llama_decode</text>
        <text x="130" y="606" text-anchor="middle" font-size="9" fill="#1e3a8a">get logits, sample</text>
        <text x="130" y="622" text-anchor="middle" font-size="9" fill="#1e3a8a">write CSV, print</text>
        <line x1="130" y1="638" x2="130" y2="668" stroke="#57534e" stroke-width="1.5"/>
        <rect x="50" y="668" width="160" height="28" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
        <text x="130" y="685" text-anchor="middle" font-size="9" fill="#1e3a8a">batch ← 1 token</text>
        <path d="M 130 696 Q 260 710 260 538" fill="none" stroke="#57534e" stroke-width="1.2" stroke-dasharray="5 4"/>
        <text x="300" y="700" font-size="8" fill="#78716c">loop</text>
      </svg>
    </div>
    <footer>Decoder-only models skip the encoder branch: flow goes prompt batch → <code>run()</code> loop directly after <code>decode()</code> sets up the first batch.</footer>
  </div>
</body>
</html>
